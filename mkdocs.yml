site_name: SmlCoke Home # 改成你的
site_url: https://smlcoke.com
site_author: SmlCoke

theme:
  name: material
  custom_dir: overrides
  language: zh
  font:
    text: false
    code: false
  palette:
    - scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs # 将左侧导航栏变为顶部标签页
    - navigation.tabs.sticky # 顶部标签页滚动时保持可见
    - navigation.top # 添加返回顶部按钮
    - navigation.instant # 页面切换更顺滑
    - navigation.instant.progress # 页面切换时显示进度条
    - navigation.tracking # 右侧目录随滚动高亮
    - navigation.indexes # 允许 index.md 作为分区首页
    - toc.follow # 右侧目录跟随滚动
    - search.suggest # 搜索建议
    - search.highlight # 搜索高亮
    - header.autohide # 页面向下滚动时自动隐藏导航栏
    - content.code.annotate # 启用代码注释标记
    - content.tabs.link # 同名标签页联动切换

# 配置插件（启用搜索和博客功能）
plugins:
  - search
  - blog

# 配置 Markdown 扩展（启用数学公式支持）
markdown_extensions:
  - admonition # 极其漂亮的提示/警告框！
  - attr_list # 允许给图片加 class、宽度等样式
  - def_list # 定义列表，适合术语解释
  - footnotes # 脚注支持
  - md_in_html # 允许在 HTML 容器中混写 Markdown
  - nl2br # 将换行符转换为 <br> 标签，启用单回车换行支持
  - tables # 表格支持
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details # 允许折叠提示框
  - pymdownx.highlight: # 代码高亮美化
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.keys # 按键提示样式
  - pymdownx.inlinehilite # 行内代码高亮
  - pymdownx.mark # 允许使用 ==高亮文字==
  - pymdownx.superfences # 高级代码块
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde # 允许使用 ~~删除线~~

# 引入自定义 CSS（用于背景动画和按钮）
extra_css:
  - stylesheets/extra.css?v=20260607-1 # 每次更新时，注意修改?v查询参数，防止浏览器直接利用本地旧缓存
  - https://unpkg.com/katex@0/dist/katex.min.css # 添加 KaTeX CSS

extra_javascript:
  - javascripts/extra.js?v=20260604-2
  - javascripts/crypto.js
  - https://unpkg.com/katex@0/dist/katex.min.js # 先引入 KaTeX 核心
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js # 引入 KaTeX 自动渲染插件
  - javascripts/katex.js # 最后引入初始化脚本
  
