site_name: SmlCoke Home # 改成你的
site_url: https://smlcoke.com
site_author: SmlCoke

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.tabs # 将左侧导航栏变为顶部的标签页，看起来更像官网
    - navigation.top # 添加返回顶部按钮
    - header.autohide # 页面向下滚动时自动隐藏导航栏
    - navigation.indexes # 允许 index.md 作为分区首页
    - content.code.copy # 🔥 新增：代码块右上角的一键复制按钮

# 配置插件（启用搜索和博客功能）
plugins:
  - search
  - blog

# 配置 Markdown 扩展（启用数学公式支持）
markdown_extensions:
  - nl2br # 将换行符转换为 <br> 标签，启用单回车换行支持
  - pymdownx.arithmatex:
      generic: true
  # 👇 下面全是让网页变美的魔法扩展 👇
  - admonition # 极其漂亮的提示/警告框！
  - pymdownx.details # 允许折叠提示框
  - pymdownx.superfences # 高级代码块
  - pymdownx.highlight: # 代码高亮美化
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite # 行内代码高亮
  - pymdownx.mark # 允许使用 ==高亮文字==
  - pymdownx.tilde # 允许使用 ~~删除线~~
  - attr_list # 允许给图片加居中等样式

# 引入自定义 CSS（用于背景动画和按钮）
extra_css:
  - stylesheets/extra.css?v=20260224 # 每次更新时，注意修改?v查询参数，防止浏览器直接利用本地旧缓存
  - https://unpkg.com/katex@0/dist/katex.min.css # 添加 KaTeX CSS

extra_javascript:
  - javascripts/extra.js
  - https://unpkg.com/katex@0/dist/katex.min.js # 先引入 KaTeX 核心
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js # 引入 KaTeX 自动渲染插件
  - javascripts/katex.js # 最后引入初始化脚本
  
nav:
  - 首页: index.md
  - 博客: blog/ # 博客插件会自动接管这个目录
  - 微电子: 
    - me/index.md
    - Signal and Systems: me/SS/index.md
    - Digital Integrated Circuits: 
      - Glossary: me/DIC/Glossary.md
      - Course Design: 
        - Init: me/DIC/CourseDesign/init.md
        - Introduction: me/DIC/CourseDesign/introduction.md
        - Specification: me/DIC/CourseDesign/Design_Specifications.md
        - Re-quantization: me/DIC/CourseDesign/Re-quantization.md
      - VLSI: 
        - me/DIC/VLSI/index.md
        - Ch 1 Basics: me/DIC/VLSI/ch1-introduction/introduction.md
        - Ch 2 Modulation and Demodulation: me/DIC/VLSI/ch2-modulation/modulation.md
      - Processors:
          - Ch 1 ISA: me/DIC/PU/ch1-the_software_hardware_interface/note.md
    - Verilog HDL Basics: me/verilog/Study_note.md
    - EDA Tools:
      - VS Code + Verilog : me/EDA/vscode/vscode.md
      - MobaXterm + Linux : me/EDA/mobaxterm/mobaxterm.md 
  - 机器学习:
    - ml/Basic/index.md
    - 全连接神经网络: ml/Basic/ch1_Full_Connected_NN/ch1_神经网络与深度学习基础.md
    - 优化: ml/Basic/ch2_Optimization/ch2_2_Optimization.md
    - CNN: ml/Basic/ch3_CNN/ch3_CNN.md
    - Self-Attention: ml/Basic/ch4_Self_Attention/ch4_self_attention基础.md
    - Transformer: ml/Basic/ch5_Transformer/ch5_transformer基础.md
  - 计算机视觉:
    - ml/CV/index.md
    - ResNet: ml/CV/ResNet/notes.md
    - DenseNet: ml/CV/DenseNet/notes.md
    - YOLO v1: ml/CV/YOLO/YOLO.md
    - YOLO v2: ml/CV/YOLO/YOLOv2.md
    - YOLO v3: ml/CV/YOLO/YOLOv3.md
    - ViT: ml/CV/VIT/ViT.md
    - PFLD: ml/CV/PFLD/PFLD.md
  - Rust:
    - Rust 学习笔记: rust/notes/Study.md
    - Rust 加密/解密在线工具: rust/crypto.md
  - 人工智能:
    - AI-Tools/index.md
    - Claude Code: AI-Tools/ClaudeCode/Claude-Code.md
    - MCP Server: AI-Tools/MCP/mcp_server.md
    - OpenRouter: AI-Tools/OpenRouter/openrouter.md
    - OpenCode: AI-Tools/OpenCode/opencode.md
    - Aider: AI-Tools/Aider/aider.md
  - 工具:
    - Tools/index.md
    - Docker: Tools/docker/docker.md
  - 留言板: comments/index.md
